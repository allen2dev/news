<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pulse — 多源新闻聚合，实时刷新" />
  <title>Pulse · 新闻聚合</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("pulse-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches)
          document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="site-header">
    <div class="logo-wrap">
      <span class="logo-mark" aria-hidden="true"></span>
      <div>
        <h1 class="logo">Pulse</h1>
        <p class="tagline">多源实时聚合 · 一键刷新全网头条</p>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" class="btn btn-ghost" id="btn-theme" title="切换亮/暗主题" aria-pressed="false">
        <span class="theme-icon theme-icon-sun" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </span>
        <span class="theme-icon theme-icon-moon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </span>
        <span class="sr-only theme-label">主题</span>
      </button>
      <label class="search-wrap">
        <span class="sr-only">搜索标题</span>
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
        </svg>
        <input type="search" id="search" class="search-input" placeholder="筛选标题…" autocomplete="off" />
      </label>
      <button type="button" class="btn btn-ghost" id="btn-refresh" title="重新拉取">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span>刷新</span>
      </button>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="分类">
    <button type="button" class="tab is-active" role="tab" aria-selected="true" data-category="all">全部</button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-category="tech">科技</button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-category="world">国际</button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-category="dev">开发者</button>
  </nav>

  <section class="status-bar" aria-live="polite">
    <span id="status-text">准备就绪</span>
    <span class="dot" id="status-dot"></span>
  </section>

  <main class="grid-wrap" id="main-list">
    <!-- Static skeleton so first paint is never empty (before JS runs) -->
    <div id="skeleton" class="skeleton-grid is-loading boot-skeleton" aria-hidden="false">
      <div class="sk"><div class="sk-img"></div><div class="sk-line sk-line-lg"></div><div class="sk-line"></div><div class="sk-line sk-line-short"></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-line sk-line-lg"></div><div class="sk-line"></div><div class="sk-line sk-line-short"></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-line sk-line-lg"></div><div class="sk-line"></div><div class="sk-line sk-line-short"></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-line sk-line-lg"></div><div class="sk-line"></div><div class="sk-line sk-line-short"></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-line sk-line-lg"></div><div class="sk-line"></div><div class="sk-line sk-line-short"></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-line sk-line-lg"></div><div class="sk-line"></div><div class="sk-line sk-line-short"></div></div>
    </div>
    <div id="grid" class="card-grid" aria-busy="false"></div>
    <div id="empty" class="empty-state" hidden>
      <p>暂无匹配条目，试试其它关键词或分类。</p>
    </div>
    <div id="error" class="error-state" hidden>
      <p id="error-msg">加载失败</p>
      <button type="button" class="btn btn-primary" id="btn-retry">重试</button>
    </div>
  </main>

  <article id="detail-panel" class="detail-panel" hidden aria-hidden="true">
    <div class="detail-inner">
      <header class="detail-header">
        <button type="button" class="btn btn-back" id="btn-back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          返回列表
        </button>
        <div class="detail-meta">
          <span class="source-pill" id="detail-source"></span>
          <time class="time" id="detail-time"></time>
        </div>
        <h1 class="detail-title" id="detail-title"></h1>
      </header>
      <figure class="detail-figure" id="detail-figure" hidden>
        <img id="detail-image" src="" alt="" loading="lazy" decoding="async" />
      </figure>
      <div class="detail-body prose" id="detail-body"></div>
      <p class="detail-fallback" id="detail-fallback" hidden>暂无正文摘要，请前往原文阅读完整报道。</p>
      <footer class="detail-footer">
        <a class="btn btn-primary" id="detail-external" href="#" target="_blank" rel="noopener noreferrer">在浏览器中打开原文</a>
      </footer>
    </div>
  </article>

  <footer class="site-footer" id="site-footer">
    <p>数据来源为公开 RSS，摘要与链接归各媒体所有 · 仅供个人阅读</p>
  </footer>

  <script src="./js/app.js" type="module"></script>
</body>
</html>
